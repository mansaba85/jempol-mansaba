
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Slip Honor April 2026 - MA NU 01 Banyuputih</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @page { 
            size: 215.9mm 330.2mm; 
            margin: 10mm; 
        }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: #fff; }
        
        .no-print { text-align: center; padding: 20px; background: #f4f4f9; border-bottom: 1px solid #ddd; }
        .print-btn { background: #086862; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 5px;
            row-gap: 15px;
            padding: 10px;
        }
        
        .slip { 
            width: 65mm; 
            height: 48mm; 
            border: 0.5px solid #ddd; 
            padding: 8px;
            box-sizing: border-box;
            font-size: 8px;
            position: relative;
            overflow: hidden;
            background: white;
        }
        
        .header { text-align: center; border-bottom: 1.5px solid #000; margin-bottom: 5px; padding-bottom: 2px; }
        .header h1 { font-size: 9px; margin: 0; font-weight: 800; }
        .header p { font-size: 7px; margin: 0; font-weight: 600; text-transform: uppercase; }
        
        .emp-info { margin-bottom: 4px; }
        .emp-name { font-size: 9px; font-weight: 800; margin: 0; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .emp-sub { font-size: 7px; color: #444; }
        
        .row { display: flex; justify-content: space-between; margin-bottom: 1px; }
        .label { font-weight: 500; }
        .val { text-align: right; font-weight: 600; }
        .voucher { color: #d97706; font-style: italic; }
        
        .total-box { 
            border-top: 1px dashed #000; 
            margin-top: 5px; 
            padding-top: 3px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            gap: 5px;
        }
        .total-label { font-weight: 800; font-size: 9px; }
        .total-val { font-size: 10px; font-weight: 900; }
        
        @media print {
            .no-print { display: none; }
            .slip { border: 0.5px solid #ccc; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <button class="print-btn" onclick="window.print()">CETAK SLIP SEKARANG (CTRL+P)</button>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Ukuran disesuaikan: 65mm x 48mm (F4 Paper)</p>
    </div>

    <div class="grid-container" id="slip-container"></div>

        const container = document.getElementById('slip-container');
        
        data.forEach(item => {
            const discRate = item.type === "SERTIF" ? 15000 : 25000;
            const tdkRate = 10000;
            const voucher = 30000;
            
            const discTotal = item.disc * discRate;
            const tdkTotal = item.tdk * tdkRate;
            const finalTotal = discTotal + tdkTotal - voucher;

            const slip = document.createElement('div');
            slip.className = 'slip';
            slip.innerHTML = `
                <div class="header">
                    <h1>MA NU 01 BANYUPUTIH</h1>
                    <p>SLIP HONOR - APRIL 2026</p>
                </div>
                <div class="emp-info">
                    <p class="emp-name">${item.nama}</p>
                    <p class="emp-sub">ID: ${item.id} | ${item.type}</p>
                </div>
                
                <div class="row">
                    <span class="label">Disiplin: &nbsp;&nbsp; ${item.disc} x ${discRate.toLocaleString('id-ID')}</span>
                    <span class="val">${discTotal.toLocaleString('id-ID')}</span>
                </div>
                <div class="row">
                    <span class="label">Tdk Dis: &nbsp;&nbsp; ${item.tdk} x ${tdkRate.toLocaleString('id-ID')}</span>
                    <span class="val">${tdkTotal.toLocaleString('id-ID')}</span>
                </div>
                <div class="row voucher">
                    <span class="label">Voucher: &nbsp; - Potongan -</span>
                    <span class="val">(${voucher.toLocaleString('id-ID')})</span>
                </div>
                
                <div class="total-box">
                    <span class="total-label">TOTAL:</span>
                    <span class="total-val">Rp ${finalTotal.toLocaleString('id-ID')}</span>
                </div>
            `;
            container.appendChild(slip);
        });
    </script>
</body>
</html>
